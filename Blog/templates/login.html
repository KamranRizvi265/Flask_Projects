{% extends "layout.html" %}
{% block body %}

<div class="container mt-5 pt-5 mb-5 hv-main-content">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4"> 
            
            <div class="card shadow-sm border-0 bg-light">
                <div class="card-body text-center p-5">
                    
                    <form class="form-signin" action="/dashboard" method="POST">
                        <img class="mb-4" src="{{ url_for('static', filename='assets/favicon.ico') }}" alt="" width="72" height="72">
                        <h1 class="h3 mb-4 fw-normal">Admin Login</h1>

                        {% if error %}
                        <div class="alert alert-danger text-center mb-4" role="alert">
                            {{ error }}
                        </div>
                        {% endif %}
                        
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="inputEmail" name="email" placeholder="name@example.com" required autofocus>
                            <label for="inputEmail">Email address</label>
                        </div>
                        
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="inputPassword" name="password" placeholder="Password" required>
                            <label for="inputPassword">Password</label>
                        </div>
                        
                        <div class="form-check text-start mb-4">
                            <input class="form-check-input" type="checkbox" value="remember-me" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        
                        <button class="btn btn-primary btn-lg w-100 text-uppercase" type="submit">Sign in</button>
                        <p class="mt-5 mb-0 text-muted">&copy; Nexus 2026</p>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
