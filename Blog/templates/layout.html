<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Nexus</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename= 'assets/favicon.ico') }}" />
    <!-- Font Awesome icons (free version)-->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts-->
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet"
        type="text/css" />
    <link
        href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800"
        rel="stylesheet" type="text/css" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="{{ url_for('static', filename= 'css/styles.css') }}" rel="stylesheet" />
</head>

<body class="hv-theme-body">
    <!-- Navigation-->
    <nav class="navbar navbar-expand-lg navbar-light hv-navbar" id="mainNav">
        <div class="container px-4 px-lg-5 hv-nav-container">
            <a class="navbar-brand hv-navbar-brand" href="index.html">Nexus Tech</a>
            <button class="navbar-toggler hv-navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false"
                aria-label="Toggle navigation">
                Menu
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse hv-navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto py-4 py-lg-0 hv-navbar-nav">
                    <li class="nav-item hv-nav-item navbar-expand-lg"><a
                            class="nav-link px-lg-3 py-3 py-lg-4 hv-nav-link" href="index.html">Home</a></li>
                    <li class="nav-item hv-nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4 hv-nav-link"
                            href="about.html">About</a></li>
                    <li class="nav-item hv-nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4 hv-nav-link"
                            href="post.html">Post</a></li>
                    <li class="nav-item hv-nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4 hv-nav-link"
                            href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Wrapper for load animations -->
    <div class="hv-main-wrapper">
        {% block body %} {% endblock %}
    </div>

    <!-- Footer-->
    <footer class="border-top hv-footer">
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 align-items-center justify-content-between hv-footer-row">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <div class="small text-muted fst-italic hv-copyright">Copyright &copy; Nexus 2026<br>Built with
                        Flask & Bootstrap</div>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <ul class="list-inline text-center text-md-end mb-0 hv-social-list">
                        <li class="list-inline-item hv-social-item">
                            <a href="#!" class="hv-social-link">
                                <span class="fa-stack fa-lg">
                                    <i class="fas fa-circle fa-stack-2x"></i>
                                    <i class="fab fa-twitter fa-stack-1x fa-inverse"></i>
                                </span>
                            </a>
                        </li>
                        <li class="list-inline-item hv-social-item">
                            <a href="#!" class="hv-social-link">
                                <span class="fa-stack fa-lg">
                                    <i class="fas fa-circle fa-stack-2x"></i>
                                    <i class="fab fa-facebook-f fa-stack-1x fa-inverse"></i>
                                </span>
                            </a>
                        </li>
                        <li class="list-inline-item hv-social-item">
                            <a href="#!" class="hv-social-link">
                                <span class="fa-stack fa-lg">
                                    <i class="fas fa-circle fa-stack-2x"></i>
                                    <i class="fab fa-github fa-stack-1x fa-inverse"></i>
                                </span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>
    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="{{ url_for('static', filename= 'js/scripts.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
